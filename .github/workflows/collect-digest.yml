name: Collect DB Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1,4"

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run digest collection
        run: python3 scripts/run_digest.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports public/data
          git diff --cached --quiet && exit 0
          git commit -m "Update database research digest"
          git push
